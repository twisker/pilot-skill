<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<title>{{TITLE}}</title>
<style>
  @page {
    size: A4;
    margin: 18mm 14mm;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei",
      "Hiragino Sans GB", "Helvetica Neue", Arial, sans-serif;
    color: #1a1a1a;
    line-height: 1.6;
    font-size: 12px;
  }
  h1, h2, h3 { color: #0f172a; }
  h1 { font-size: 26px; }
  h2 {
    font-size: 18px;
    border-bottom: 2px solid #0f172a;
    padding-bottom: 4px;
    margin-top: 28px;
  }
  h3 { font-size: 14px; margin-bottom: 4px; }
  h4 { font-size: 12px; margin: 10px 0 4px; color: #334155; }
  section.chapter { page-break-before: always; }
  section.cover { page-break-before: avoid; text-align: center; padding-top: 30%; }
  table {
    width: 100%;
    border-collapse: collapse;
    margin: 8px 0 16px;
    font-size: 11px;
  }
  th, td {
    border: 1px solid #cbd5e1;
    padding: 6px 8px;
    text-align: left;
    vertical-align: top;
  }
  th { background: #f1f5f9; }
  .muted { color: #64748b; }
  .over-budget { color: #b91c1c; font-weight: bold; }
  ul { margin: 4px 0; padding-left: 20px; }
  .day-block { margin-bottom: 18px; }
  .tag {
    display: inline-block;
    background: #e2e8f0;
    border-radius: 4px;
    padding: 1px 6px;
    margin-right: 4px;
    font-size: 10px;
  }
  .nowrap { white-space: nowrap; }
  .checkbox { text-align: center; }
  tr.append-row td { height: 22px; }
  tr.total-row td { font-weight: bold; background: #f8fafc; }
</style>
</head>
<body>
{{CONTENT}}
</body>
</html>
